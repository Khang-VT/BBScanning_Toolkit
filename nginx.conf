# ╔══════════════════════════════════════════════════════════════╗
# ║   BugBounty AutoScanner — Nginx Reverse Proxy Config        ║
# ║   Copy to: /etc/nginx/sites-available/scanner               ║
# ║   Enable:  ln -s /etc/nginx/sites-available/scanner \       ║
# ║                  /etc/nginx/sites-enabled/                  ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Rate limiting zones ────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=scanner_req:10m  rate=10r/s;
limit_conn_zone $binary_remote_addr zone=scanner_conn:10m;

server {
    listen 80;
    # listen [::]:80;

    # ── Replace with your domain or server IP ──────────────────
    server_name your-domain.com;

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # ── Security headers ───────────────────────────────────────
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "no-referrer"     always;

    # ── Rate limit ─────────────────────────────────────────────
    limit_req  zone=scanner_req burst=20 nodelay;
    limit_conn zone=scanner_conn 20;

    # ── Proxy to gunicorn ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
        client_max_body_size 1m;
    }

    # ── SSE streams: disable buffering ────────────────────────
    location /api/scan {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   Connection      '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Static files ───────────────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:5000;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Block sensitive paths ──────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~ \.(json|txt|sh|py|yaml|cfg)$ {
        deny all;
    }
}

